resolver 127.0.0.11 valid=1s;

upstream php_apps {
    random;
    zone php_apps 64k;
    server app:8000 resolve;
}

server {
    listen 80;

    location / {
        proxy_pass http://php_apps;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
